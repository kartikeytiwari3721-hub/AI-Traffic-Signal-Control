<!DOCTYPE html>
<html>
<head>
    <title>AI Traffic System Demo</title>
</head>
<body style="font-family: sans-serif; background-color: #f0f0f0;">
    <h1>AI Traffic System</h1>
    <p>This is a minimal web demonstration deployed on Render.</p>

    <div style="display: flex; gap: 20px;">
        <div style="background: #fff; padding: 20px; border-radius: 8px;">
            <h3>Live YOLO Video Feed</h3>
            <img src="/video_feed" alt="Video stream loading..." width="300" height="420" style="background: #000;">
        </div>
        <div style="background: #fff; padding: 20px; border-radius: 8px; width: 300px;">
            <h3>AI Simulation Stats</h3>
            <p><strong>Step:</strong> <span id="step">0</span></p>
            <p><strong>Reward:</strong> <span id="reward">0</span></p>
            <p><strong>Wait Time:</strong> <span id="wait_time">0</span></p>
            <p><strong>Current Phase:</strong> <span id="current_phase">-</span></p>
        </div>
    </div>

    <script>
        // Poll stats every 1 second
        setInterval(() => {
            fetch('/api/simulation_stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('step').innerText = data.step;
                    document.getElementById('reward').innerText = data.reward;
                    document.getElementById('wait_time').innerText = data.wait_time;
                    document.getElementById('current_phase').innerText = data.current_phase;
                });
        }, 1000);
    </script>
</body>
</html>
